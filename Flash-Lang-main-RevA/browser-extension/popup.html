<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>ReadFluent Capture</title>
  <style>
    body { font-family: Arial, sans-serif; width: 320px; margin: 12px; }
    label { font-size: 12px; color: #444; display: block; margin-top: 8px; }
    input, select, textarea, button { width: 100%; box-sizing: border-box; margin-top: 4px; padding: 8px; }
    textarea { resize: vertical; min-height: 56px; }
    .row { display: flex; gap: 8px; }
    .row > * { flex: 1; }
    .status { margin-top: 8px; font-size: 12px; }
    .ok { color: #15803d; }
    .err { color: #b91c1c; }
  </style>
</head>
<body>
  <h3 style="margin:0 0 8px 0;">ReadFluent Capture</h3>
  <label>Backend URL</label>
  <input id="apiBase" value="http://127.0.0.1:8000" />

  <div class="row">
    <div>
      <label>CEFR</label>
      <select id="cefrLevel">
        <option>A1</option><option>A2</option><option>B1</option><option selected>B2</option><option>C1</option><option>C2</option>
      </select>
    </div>
    <div>
      <label>Child Mode</label>
      <select id="childMode"><option value="false" selected>Off</option><option value="true">On</option></select>
    </div>
  </div>

  <div class="row">
    <div>
      <label>Source Lang</label>
      <select id="sourceLanguage">
        <option value="auto">auto</option><option value="en" selected>en</option><option value="zh">zh</option><option value="ja">ja</option><option value="es">es</option><option value="fr">fr</option>
      </select>
    </div>
    <div>
      <label>Target Lang</label>
      <select id="targetLanguage">
        <option value="en">en</option><option value="zh" selected>zh</option><option value="ja">ja</option><option value="es">es</option><option value="fr">fr</option>
      </select>
    </div>
  </div>

  <label>Highlighted Text (auto-captured from selection)</label>
  <textarea id="highlightedText" placeholder="Select text on page, then click Capture Selection."></textarea>
  <button id="captureBtn">Capture Selection</button>
  <button id="sendBtn">Create Lesson</button>
  <button id="openDashboardBtn">Open Dashboard</button>
  <div id="status" class="status"></div>

  <script src="popup.js"></script>
</body>
</html>
