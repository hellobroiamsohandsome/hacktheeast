<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ReadFluent — Language immersion from your content</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['DM Sans', 'system-ui', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
          colors: {
            fluent: { bg: '#0f0f12', card: '#18181d', border: '#2a2a32', accent: '#6366f1', accentDim: '#4f46e5', muted: '#71717a', text: '#fafafa' }
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'DM Sans', system-ui, sans-serif; }
    .tab-active { border-bottom: 2px solid #6366f1; color: #fafafa; }
    .transcript-line:hover { background: rgba(99, 102, 241, 0.08); }
    .transcript-line.active { background: rgba(99, 102, 241, 0.15); border-left: 3px solid #6366f1; }
    .quiz-option { transition: all 0.2s; }
    .quiz-option:hover { border-color: #6366f1; }
    .quiz-option.correct { border-color: #22c55e; background: rgba(34, 197, 94, 0.1); }
    .quiz-option.wrong { border-color: #ef4444; background: rgba(239, 68, 68, 0.1); }
  </style>
</head>
<body class="bg-fluent-bg text-fluent-text min-h-screen antialiased">
  <div class="max-w-5xl mx-auto px-4 sm:px-6 py-8 sm:py-12">
    <header class="mb-10">
      <h1 class="text-2xl sm:text-3xl font-bold tracking-tight text-white">ReadFluent</h1>
      <p class="text-fluent-muted mt-1 text-sm sm:text-base">Turn what you read and watch into a personalized, privacy-first language lesson.</p>
    </header>

    <!-- CEFR Level Quick Start -->
    <section class="bg-fluent-card border border-fluent-border rounded-xl p-5 sm:p-6 mb-6">
      <h2 class="text-lg font-semibold text-white mb-4">🎯 Quick Start - Choose Your Level</h2>
      <p class="text-fluent-muted text-sm mb-4">Select your CEFR level to get personalized content instantly!</p>
      <div class="grid grid-cols-3 sm:grid-cols-6 gap-2 mb-4">
        <button onclick="generateByLevel('A1')" class="px-3 py-2 rounded-lg bg-fluent-bg border border-fluent-border text-white text-sm font-medium hover:border-fluent-accent hover:bg-fluent-accent/10 transition">
          <span class="block text-lg mb-1">🟢</span>A1<br><span class="text-xs text-fluent-muted">Beginner</span>
        </button>
        <button onclick="generateByLevel('A2')" class="px-3 py-2 rounded-lg bg-fluent-bg border border-fluent-border text-white text-sm font-medium hover:border-fluent-accent hover:bg-fluent-accent/10 transition">
          <span class="block text-lg mb-1">🟡</span>A2<br><span class="text-xs text-fluent-muted">Elementary</span>
        </button>
        <button onclick="generateByLevel('B1')" class="px-3 py-2 rounded-lg bg-fluent-bg border border-fluent-border text-white text-sm font-medium hover:border-fluent-accent hover:bg-fluent-accent/10 transition">
          <span class="block text-lg mb-1">🟠</span>B1<br><span class="text-xs text-fluent-muted">Intermediate</span>
        </button>
        <button onclick="generateByLevel('B2')" class="px-3 py-2 rounded-lg bg-fluent-bg border border-fluent-border text-white text-sm font-medium hover:border-fluent-accent hover:bg-fluent-accent/10 transition">
          <span class="block text-lg mb-1">🔵</span>B2<br><span class="text-xs text-fluent-muted">Upper-Int</span>
        </button>
        <button onclick="generateByLevel('C1')" class="px-3 py-2 rounded-lg bg-fluent-bg border border-fluent-border text-white text-sm font-medium hover:border-fluent-accent hover:bg-fluent-accent/10 transition">
          <span class="block text-lg mb-1">🟣</span>C1<br><span class="text-xs text-fluent-muted">Advanced</span>
        </button>
        <button onclick="generateByLevel('C2')" class="px-3 py-2 rounded-lg bg-fluent-bg border border-fluent-border text-white text-sm font-medium hover:border-fluent-accent hover:bg-fluent-accent/10 transition">
          <span class="block text-lg mb-1">⚫</span>C2<br><span class="text-xs text-fluent-muted">Mastery</span>
        </button>
      </div>
    </section>

    <!-- URL Input Section -->
    <section class="bg-fluent-card border border-fluent-border rounded-xl p-5 sm:p-6 mb-6">
      <label class="block text-sm font-medium text-fluent-muted mb-2">Or enter a YouTube URL / Article link</label>
      <div class="flex flex-col sm:flex-row gap-3">
        <input type="url" id="urlInput" placeholder="https://www.youtube.com/watch?v=..." class="flex-1 rounded-lg border border-fluent-border bg-fluent-bg px-4 py-3 text-white placeholder-fluent-muted focus:outline-none focus:ring-2 focus:ring-fluent-accent font-mono text-sm">
        <select id="cefrLevel" class="rounded-lg border border-fluent-border bg-fluent-bg px-3 py-3 text-white focus:outline-none focus:ring-2 focus:ring-fluent-accent font-medium text-sm">
          <option value="A1">A1</option>
          <option value="A2">A2</option>
          <option value="B1">B1</option>
          <option value="B2" selected>B2</option>
          <option value="C1">C1</option>
          <option value="C2">C2</option>
        </select>
        <button id="generateBtn" class="px-5 py-3 rounded-lg bg-fluent-accent hover:bg-fluent-accentDim text-white font-medium text-sm">Generate</button>
      </div>
      <div class="mt-4 grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-xs text-fluent-muted mb-1">🌐 I know this language (translated</label>
           from)<select id="sourceLanguage" class="w-full rounded-lg border border-fluent-border bg-fluent-bg px-3 py-2 text-white text-sm">
            <option value="auto">Auto-detect</option>
            <option value="en" selected>English</option>
            <option value="zh">中文</option>
            <option value="ja">日本語</option>
            <option value="es">Español</option>
            <option value="fr">Français</option>
            <option value="de">Deutsch</option>
            <option value="ko">한국어</option>
          </select>
        </div>
        <div>
          <label class="block text-xs text-fluent-muted mb-1">📚 I'm learning this language</label>
          <select id="targetLanguage" class="w-full rounded-lg border border-fluent-border bg-fluent-bg px-3 py-2 text-white text-sm">
            <option value="en">English</option>
            <option value="zh" selected>中文</option>
            <option value="ja">日本語</option>
            <option value="es">Español</option>
            <option value="fr">Français</option>
            <option value="de">Deutsch</option>
            <option value="ko">한국어</option>
          </select>
        </div>
      </div>
      <div class="mt-4 flex items-center gap-2">
        <button id="childModeToggle" class="relative inline-flex h-6 w-11 rounded-full bg-fluent-border">
          <span class="inline-block h-5 w-5 transform rounded-full bg-white transition translate-x-0.5"></span>
        </button>
        <span class="text-sm text-fluent-muted">Child Mode</span>
      </div>
    </section>

    <div id="loadingBlock" class="hidden bg-fluent-card border border-fluent-border rounded-xl p-8 text-center">
      <div class="inline-block h-8 w-8 animate-spin rounded-full border-2 border-fluent-accent border-t-transparent"></div>
      <p id="loadingText" class="mt-3 text-fluent-muted">Loading...</p>
    </div>

    <div id="errorBlock" class="hidden bg-red-950/30 border border-red-800 rounded-xl p-4 text-red-200 text-sm"></div>

    <section id="learningHub" class="hidden bg-fluent-card border border-fluent-border rounded-xl overflow-hidden">
      <div class="px-5 py-4 border-b border-fluent-border flex justify-between items-center">
        <h2 id="lessonTitle" class="text-lg font-semibold text-white"></h2>
        <button id="ttsBtn" class="text-sm text-fluent-accent">🔊 Listen</button>
      </div>
      <div class="flex border-b border-fluent-border">
        <button data-tab="transcript" class="tab-btn px-5 py-3 text-sm font-medium text-fluent-muted tab-active">Transcript</button>
        <button data-tab="reading" class="tab-btn px-5 py-3 text-sm font-medium text-fluent-muted">Reading</button>
        <button data-tab="quizzes" class="tab-btn px-5 py-3 text-sm font-medium text-fluent-muted">Quizzes</button>
        <button data-tab="vocabulary" class="tab-btn px-5 py-3 text-sm font-medium text-fluent-muted">Vocabulary</button>
      </div>
      <div class="p-5">
        <div id="panel-transcript" class="tab-panel">
          <div class="grid grid-cols-1 lg:grid-cols-3 gap-5">
            <div class="lg:col-span-1 rounded-lg bg-fluent-bg aspect-video">
              <iframe id="videoEmbed" class="w-full h-full" allowfullscreen></iframe>
            </div>
            <div class="lg:col-span-2 max-h-[420px] overflow-y-auto space-y-1" id="transcriptList"></div>
          </div>
        </div>
        <div id="panel-reading" class="tab-panel hidden">
          <div id="articleContent" class="text-white"></div>
        </div>
        <div id="panel-quizzes" class="tab-panel hidden">
          <div class="flex items-center justify-between mb-3">
            <p class="text-fluent-muted text-sm">Answer, then see the correct answer and explanation.</p>
            <button id="refreshQuizBtn" class="px-3 py-1.5 rounded border border-fluent-border text-sm text-white hover:border-fluent-accent">Refresh Quizzes</button>
          </div>
          <div id="quizContainer"></div>
        </div>
        <div id="panel-vocabulary" class="tab-panel hidden">
          <div id="flashcardsList" class="grid gap-3 sm:grid-cols-2"></div>
        </div>
      </div>
    </section>
  </div>

  <script>
    let currentContent = null;
    let childMode = false;
    let currentQuizIndex = 0;
    let quizScore = 0;
    let selectedQuizIndex = null;

    // Global function for level buttons
    function generateByLevel(level) {
      console.log('Generating level:', level);
      document.getElementById('cefrLevel').value = level;
     document.getElementById('urlInput').value = '';
      generateLesson('', level);
    }

    function generateLesson(url, level) {
      const endpoint = url ? '/process-content' : '/generate-by-level';
      
      document.getElementById('errorBlock').classList.add('hidden');
      document.getElementById('loadingBlock').classList.remove('hidden');
      document.getElementById('learningHub').classList.add('hidden');
      document.getElementById('generateBtn').disabled = true;
      document.getElementById('loadingText').textContent = url ? 'Processing...' : 'Generating ' + level + ' lesson...';

      const payload = url ? {
        url: url,
        type: url.includes('youtube') ? 'youtube' : 'article',
        cefrLevel: level,
        isChildMode: childMode,
        sourceLanguage: document.getElementById('sourceLanguage').value,
        targetLanguage: document.getElementById('targetLanguage').value
      } : {
        cefrLevel: level,
        targetLanguage: document.getElementById('targetLanguage').value,
        sourceLanguage: document.getElementById('sourceLanguage').value,
        isChildMode: childMode
      };

      console.log('Sending to:', endpoint, payload);

      fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      })
      .then(res => res.json())
      .then(data => {
        console.log('Response:', data);
        if (data.detail) throw new Error(data.detail);
        currentContent = data;
        renderLesson(data);
        document.getElementById('loadingBlock').classList.add('hidden');
        document.getElementById('learningHub').classList.remove('hidden');
      })
      .catch(err => {
        console.error('Error:', err);
        document.getElementById('errorBlock').classList.remove('hidden');
        document.getElementById('errorBlock').textContent = err.message;
        document.getElementById('loadingBlock').classList.add('hidden');
      })
      .finally(() => {
        document.getElementById('generateBtn').disabled = false;
      });
    }

    function renderLesson(data) {
      document.getElementById('lessonTitle').textContent = data.title || 'Lesson';
      
      // Video
      const mediaUrl = data.mediaUrl || '';
      const ytMatch = mediaUrl.match(/(?:v=|\/)([0-9A-Za-z_-]{11})/);
      document.getElementById('videoEmbed').src = ytMatch ? 'https://www.youtube.com/embed/' + ytMatch[1] : '';

      // Transcript
      const transcriptList = document.getElementById('transcriptList');
      transcriptList.innerHTML = '';
      (data.transcript || []).forEach((line, i) => {
        const div = document.createElement('div');
        div.className = 'px-3 py-2 rounded text-sm text-white';
        div.innerHTML = '<span class="text-fluent-muted text-xs">' + (line.timestamp || '') + '</span> ' + (line.text || '') + (line.translatedText ? '<br><span class="text-fluent-muted text-xs">' + line.translatedText + '</span>' : '');
        transcriptList.appendChild(div);
      });

      // Reading
      document.getElementById('articleContent').innerHTML = data.article || data.transcript?.map(t => t.text).join('<br>') || 'No content';

      // Vocabulary
      const flashcardsList = document.getElementById('flashcardsList');
      flashcardsList.innerHTML = '';
      const flashcards = data.vocabularyFlashcards || data.flashcards || [];
      flashcards.forEach(card => {
        const div = document.createElement('div');
        div.className = 'bg-fluent-bg border border-fluent-border rounded-lg p-4';
        div.innerHTML = '<p class="font-semibold text-white">' + (card.word || '') + '</p><p class="text-fluent-muted text-sm">' + (card.definition || '') + '</p>';
        flashcardsList.appendChild(div);
      });

      // Quizzes
      renderQuizzes(data.quizzes || []);
    }

    function renderQuizzes(quizzes) {
      const container = document.getElementById('quizContainer');
      if (!quizzes || quizzes.length === 0) {
        container.innerHTML = '<p class="text-fluent-muted">No quizzes available.</p>';
        return;
      }
      currentQuizIndex = 0;
      quizScore = 0;
      selectedQuizIndex = null;
      showQuiz(quizzes, container);
    }

    function showQuiz(quizzes, container) {
      if (currentQuizIndex >= quizzes.length) {
        container.innerHTML = '<div class="text-center py-8"><p class="text-2xl font-bold text-white">Score: ' + quizScore + '/' + quizzes.length + '</p><p class="text-fluent-muted mt-2">Click "Refresh Quizzes" for a different set.</p></div>';
        return;
      }
      
      const q = quizzes[currentQuizIndex];
      container.innerHTML =
        '<div class="bg-fluent-bg border border-fluent-border rounded-lg p-5">' +
        '<p class="text-white font-medium mb-4">' + (currentQuizIndex + 1) + '. ' + (q.question || '') + '</p>' +
        '<div class="space-y-2">' +
        (q.options || []).map((opt, i) =>
          '<button class="quiz-option w-full text-left px-4 py-3 rounded-lg border border-fluent-border text-white" data-index="' + i + '">' + opt + '</button>'
        ).join('') +
        '</div>' +
        '<div id="quizFeedback" class="hidden mt-4 rounded-lg border border-fluent-border p-3 text-sm"></div>' +
        '<div class="mt-4 flex gap-2">' +
        '<button id="submitQuizBtn" class="px-4 py-2 rounded bg-fluent-accent text-white disabled:opacity-40" disabled>Submit</button>' +
        '<button id="nextQuizBtn" class="px-4 py-2 rounded border border-fluent-border text-white hidden">Next</button>' +
        '</div>' +
        '</div>';
      
      container.querySelectorAll('.quiz-option').forEach(btn => {
        btn.addEventListener('click', () => {
          selectedQuizIndex = parseInt(btn.dataset.index);
          container.querySelectorAll('.quiz-option').forEach(b => b.classList.remove('ring-2', 'ring-fluent-accent'));
          btn.classList.add('ring-2', 'ring-fluent-accent');
          document.getElementById('submitQuizBtn').disabled = false;
        });
      });

      const submitBtn = document.getElementById('submitQuizBtn');
      const nextBtn = document.getElementById('nextQuizBtn');
      const feedback = document.getElementById('quizFeedback');
      submitBtn.addEventListener('click', () => {
        if (selectedQuizIndex === null) return;
        const correctIndex = Number(q.correct || 0);
        const isCorrect = selectedQuizIndex === correctIndex;
        if (isCorrect) quizScore++;

        const options = container.querySelectorAll('.quiz-option');
        options.forEach((opt, idx) => {
          opt.disabled = true;
          if (idx === correctIndex) opt.classList.add('correct');
          if (idx === selectedQuizIndex && idx !== correctIndex) opt.classList.add('wrong');
        });

        feedback.classList.remove('hidden');
        feedback.innerHTML =
          '<p class="' + (isCorrect ? 'text-green-300' : 'text-red-300') + ' font-medium">' +
          (isCorrect ? 'Correct!' : 'Not quite.') + '</p>' +
          '<p class="text-fluent-muted mt-1">Correct answer: <span class="text-white">' + ((q.options || [])[correctIndex] || '') + '</span></p>' +
          '<p class="text-fluent-muted mt-1">' + (q.explanation || '') + '</p>';

        submitBtn.classList.add('hidden');
        nextBtn.classList.remove('hidden');
      });

      nextBtn.addEventListener('click', () => {
        currentQuizIndex++;
        selectedQuizIndex = null;
        showQuiz(quizzes, container);
      });
    }

    // Button handlers
    document.getElementById('generateBtn').addEventListener('click', () => {
      const url = document.getElementById('urlInput').value.trim();
      const level = document.getElementById('cefrLevel').value;
      if (url) generateLesson(url, level);
    });

    document.getElementById('childModeToggle').addEventListener('click', () => {
      childMode = !childMode;
      document.getElementById('childModeToggle').classList.toggle('bg-fluent-accent', childMode);
      document.getElementById('childModeToggle').classList.toggle('bg-fluent-border', !childMode);
    });

    function activateTab(tabName) {
      const btn = document.querySelector('.tab-btn[data-tab="' + tabName + '"]');
      if (!btn) return;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
      btn.classList.add('tab-active');
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.add('hidden'));
      const panel = document.getElementById('panel-' + tabName);
      if (panel) panel.classList.remove('hidden');
    }

    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => activateTab(btn.dataset.tab));
    });

    const initialTab = new URLSearchParams(window.location.search).get('tab');
    if (initialTab) activateTab(initialTab);

    document.getElementById('refreshQuizBtn').addEventListener('click', async () => {
      if (!currentContent) return;
      const btn = document.getElementById('refreshQuizBtn');
      btn.disabled = true;
      btn.textContent = 'Refreshing...';
      try {
        const res = await fetch('/refresh-quizzes', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            title: currentContent.title || 'Lesson',
            transcript: currentContent.transcript || [],
            cefrLevel: document.getElementById('cefrLevel').value,
            targetLanguage: document.getElementById('targetLanguage').value,
            sourceLanguage: document.getElementById('sourceLanguage').value,
            isChildMode: childMode
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Failed to refresh quizzes');
        currentContent.quizzes = data.quizzes || [];
        renderQuizzes(currentContent.quizzes);
      } catch (e) {
        document.getElementById('errorBlock').classList.remove('hidden');
        document.getElementById('errorBlock').textContent = e.message || 'Failed to refresh quizzes';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Refresh Quizzes';
      }
    });
  </script>
</body>
</html>
